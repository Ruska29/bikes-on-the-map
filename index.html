<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bike Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>

<body>

<div id="map"></div>

<script>

var map = L.map('map').setView([41.7, 44.8], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

fetch("https://raw.githubusercontent.com/Ruska29/maps-bike/main/cycle.geojson")
.then(response => response.json())
.then(data => {

  L.geoJSON(data, {
    style: function () {
      return {
        color: "red",
        weight: 4
      };
    }
  }).addTo(map);

});

</script>

</body>
</html>
